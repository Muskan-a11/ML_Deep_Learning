<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Tumor Classifier</title>

<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --accent: #00e5ff;
  --accent2: #ff3cac;
  --text: #e8e8f0;
  --muted: #666;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Neon background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
}

.container {
  background: var(--card);
  padding: 40px;
  border-radius: 12px;
  width: 420px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,229,255,0.15);
}

h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

h1 span {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Upload box */
.upload-box {
  border: 2px dashed #333;
  padding: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.upload-box:hover {
  border-color: var(--accent);
  background: rgba(0,229,255,0.05);
}

/* Button */
button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border: none;
  font-weight: bold;
  background: linear-gradient(90deg, var(--accent), #00bcd4);
  color: black;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  box-shadow: 0 0 15px rgba(0,229,255,0.5);
}

/* Results */
.result {
  margin-top: 20px;
  font-size: 20px;
}

/* Bars */
.bar {
  background: #333;
  height: 8px;
  border-radius: 5px;
  margin-top: 5px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 1s ease;
}
</style>
</head>

<body>

<div class="container">
  <h1>Brain Tumor <span>Classifier</span></h1>

  <div class="upload-box">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <button onclick="predict()">Analyze MRI Scan</button>

  <div class="result" id="result"></div>
  <div id="bars"></div>
</div>

<script>
async function predict() {
  const fileInput = document.getElementById("fileInput");

  if (!fileInput.files.length) {
    alert("Upload image first");
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  try {
    const res = await fetch("/predict", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
      `<b>${data.prediction}</b><br>Confidence: ${data.confidence}%`;

    let barsHTML = "";
    for (let key in data.all_probabilities) {
      let val = data.all_probabilities[key];
      barsHTML += `
        <div>${key} (${val}%)</div>
        <div class="bar">
          <div class="fill" style="width:${val}%"></div>
        </div>
      `;
    }

    document.getElementById("bars").innerHTML = barsHTML;

  } catch {
    document.getElementById("result").innerText = "Error connecting to server";
  }
}
</script>

</body>
</html>
