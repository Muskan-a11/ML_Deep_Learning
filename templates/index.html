<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Tumor Classifier</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0a0f, #12121a);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #12121a;
  padding: 40px;
  border-radius: 10px;
  width: 400px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
}

h1 {
  margin-bottom: 20px;
}

.upload-box {
  border: 2px dashed #333;
  padding: 20px;
  margin-bottom: 20px;
  cursor: pointer;
}

.upload-box:hover {
  border-color: cyan;
}

button {
  background: linear-gradient(90deg, cyan, #00bcd4);
  border: none;
  padding: 12px;
  width: 100%;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  opacity: 0.9;
}

.result {
  margin-top: 20px;
  font-size: 18px;
}

.bar {
  height: 10px;
  background: #333;
  margin-top: 5px;
  border-radius: 5px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: cyan;
}
</style>
</head>

<body>

<div class="container">
  <h1>Brain Tumor Classifier</h1>

  <div class="upload-box">
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <button onclick="predict()">Analyze MRI Scan</button>

  <div class="result" id="result"></div>
  <div id="bars"></div>
</div>

<script>
async function predict() {
  const fileInput = document.getElementById("fileInput");

  if (!fileInput.files.length) {
    alert("Upload image first");
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  try {
    const res = await fetch("/predict", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
      `<b>${data.prediction}</b><br>Confidence: ${data.confidence}%`;

    // Probability bars
    let barsHTML = "";
    for (let key in data.all_probabilities) {
      let val = data.all_probabilities[key];
      barsHTML += `
        <div>${key} (${val}%)</div>
        <div class="bar">
          <div class="fill" style="width:${val}%"></div>
        </div>
      `;
    }

    document.getElementById("bars").innerHTML = barsHTML;

  } catch {
    document.getElementById("result").innerText = "Error connecting to server";
  }
}
</script>

</body>
</html>
